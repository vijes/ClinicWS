spring:
  application:
    name: clinica-api
  profiles:
    active: CONSOLA # Default profile

clinica:
  app:
    jwtSecret: bezK64831554425871132148523698741258963214785bezK64831554425871132148523698741258963214785
    jwtExpirationMs: 300000 # 5 minutes in milliseconds

---
# --- PROFILE: CONSOLA (In-Memory Database) ---
spring:
  config:
    activate:
      on-profile: CONSOLA
  
  datasource:
    url: jdbc:postgresql://localhost:5432/ClinicDB
    username: postgres
    password: vijes
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: SCCLINIC
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: false
    baseline-on-migrate: true
    default-schema: SCCLINIC

server:
  port: 8081

---
# --- PROFILE: PRUEBAS (PostgreSQL Database) ---
spring:
  config:
    activate:
      on-profile: PRUEBAS

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: SCCLINIC
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: false
    baseline-on-migrate: true
    default-schema: SCCLINIC

server:
  port: ${PORT:8080}

logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
