spring:
  application:
    name: clinica-api
  profiles:
    active: CONSOLA # Default profile

clinica:
  app:
    jwtSecret: bezK64831554425871132148523698741258963214785bezK64831554425871132148523698741258963214785
    jwtExpirationMs: 300000 # 5 minutes in milliseconds

---
# --- PROFILE: CONSOLA (In-Memory Database) ---
spring:
  config:
    activate:
      on-profile: CONSOLA
  
  datasource:
    url: jdbc:h2:mem:clinicdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false # Disabled for H2 to avoid schema conflicts in-memory

server:
  port: 8081

---
# --- PROFILE: PRUEBAS (PostgreSQL Database) ---
spring:
  config:
    activate:
      on-profile: PRUEBAS

  datasource:
    url: jdbc:postgresql://localhost:5432/ClinicDB
    username: postgres
    password: vijes
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: SCCLINIC
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: false
    baseline-on-migrate: true
    default-schema: SCCLINIC

server:
  port: 8081

logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
